<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System</title>
<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
}

/* From Uiverse.io by mahiatlinux */ 
.form {
  display: flex;
  flex-direction: column;
  gap: 10px;
  background-color: #1f1f1f;
  padding: 30px;
  width: 450px;
  border-radius: 20px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
    Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
}

::placeholder {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
    Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
  color: #aaa;
}

.form button {
  align-self: flex-end;
}

.flex-column > label {
  color: #f1f1f1;
  font-weight: 600;
}

.inputForm {
  border: 1.5px solid #333;
  border-radius: 10px;
  height: 50px;
  display: flex;
  align-items: center;
  padding-left: 10px;
  transition: 0.2s ease-in-out;
  background-color: #2b2b2b;
}

.input {
  margin-left: 10px;
  border-radius: 10px;
  border: none;
  width: 100%;
  height: 100%;
  background-color: #2b2b2b;
  color: #f1f1f1;
}

.input:focus {
  outline: none;
}

.inputForm:focus-within {
  border: 1.5px solid #2d79f3;
}

.flex-row {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 10px;
  justify-content: space-between;
}

.flex-row > div > label {
  font-size: 14px;
  color: #f1f1f1;
  font-weight: 400;
}

.span {
  font-size: 14px;
  margin-left: 5px;
  color: #2d79f3;
  font-weight: 500;
  cursor: pointer;
}

.button-submit {
  margin: 20px 0 10px 0;
  background-color: #2d79f3;
  border: none;
  color: white;
  font-size: 15px;
  font-weight: 500;
  border-radius: 10px;
  height: 50px;
  width: 100%;
  cursor: pointer;
}

.p {
  text-align: center;
  color: #f1f1f1;
  font-size: 14px;
  margin: 5px 0;
}

.btn {
  margin-top: 10px;
  width: 100%;
  height: 50px;
  border-radius: 10px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: 500;
  gap: 10px;
  border: 1px solid #333;
  background-color: #2b2b2b;
  color: #f1f1f1;
  cursor: pointer;
  transition: 0.2s ease-in-out;
}

.btn:hover {
  border: 1px solid #2d79f3;
}

.error {
  color: red;
  font-size: 12px;
  display: none;
}

#loading {
  display: none;
  color: #2d79f3;
  font-family: monospace;
}

#granted {
  display: none;
  color: #00ff00;
  font-family: monospace;
  font-size: 24px;
}
</style>
</head>
<body>

<div class="form" id="loginBox">
  <div class="flex-column">
    <label>Username</label>
  </div>
  <div class="inputForm">
    <input class="input" id="username" placeholder="Enter Username">
  </div>

  <div class="flex-column">
    <label>Password</label>
  </div>
  <div class="inputForm">
    <input class="input" id="password" type="password" placeholder="Enter Password">
  </div>

  <button class="button-submit" onclick="login()">Login</button>
  <div class="error" id="errorText">Error...</div>
</div>

<div id="loading">Decrypting system...</div>
<div id="granted">ACCESS GRANTED</div>

<script>
function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;
  const error = document.getElementById("errorText");

  if (user === "what_isthepassword?" && pass === "fidelio") {
    document.getElementById("loginBox").style.display = "none";
    const load = document.getElementById("loading");
    load.style.display = "block";

    setTimeout(() => {
      load.style.display = "none";
      const granted = document.getElementById("granted");
      granted.style.display = "block";
      typeEffect();
    }, 2000);

  } else {
    error.style.display = "block";
    error.innerText = randomError();
  }
}

function randomError() {
  const errors = [
    "Connection Lost...",
    "System Failure...",
    "Unauthorized Access...",
    "Data Corrupted...",
    "ERROR 0x0001"
  ];
  return errors[Math.floor(Math.random() * errors.length)];
}

function typeEffect() {
  const text = "ACCESS GRANTED";
  const el = document.getElementById("granted");
  el.innerHTML = "";
  let i = 0;

  function type() {
    if (i < text.length) {
      el.innerHTML += text.charAt(i);
      i++;
      setTimeout(type, 100);
    }
  }
  type();
}
</script>

</body>
</html>
