<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System</title>

<style>
.form {
  display: flex;
  flex-direction: column;
  gap: 10px;
  background-color: #1f1f1f;
  padding: 30px;
  width: 450px;
  border-radius: 20px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
    Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
}

/* FORCE TEXT COLORS */
.form, .form label, .form input {
  color: #f1f1f1 !important;
}

input::placeholder {
  color: #aaa;
}

.inputForm {
  border: 1.5px solid #333;
  border-radius: 10px;
  height: 50px;
  display: flex;
  align-items: center;
  padding-left: 10px;
  background-color: #2b2b2b;
}

.input {
  width: 100%;
  height: 100%;
  background: transparent;
  border: none;
  color: #f1f1f1 !important;
}

.input:focus {
  outline: none;
}

.button-submit {
  background-color: #2d79f3;
  border: none;
  color: white;
  border-radius: 10px;
  height: 50px;
  cursor: pointer;
}

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
  overflow: hidden;
}

.error { color: red; display: none; }
#loading { display:none; color:#2d79f3; font-family: monospace; }
#granted { display:none; color:#00ff00; font-family: monospace; font-size:24px; }

/* STARTUP */
#startupScreen {
  position: fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

#startupLogo {
  width:150px;
  cursor:pointer;
}

#startupLogo.show {
  animation: glitch 0.6s steps(2,end) forwards;
}

@keyframes glitch {
  0% {opacity:0; transform:scale(1.2) skew(10deg);}
  20% {opacity:1; transform:scale(0.9) skew(-10deg);}
  40% {transform:scale(1.1) skew(5deg);}
  60% {transform:scale(0.95) skew(-3deg);}
  100% {opacity:1; transform:scale(1);}
}

#topIcon {
  position:fixed;
  top:10px;
  left:10px;
  width:30px;
  display:none;
}
</style>
</head>

<body>

<img src="Tor_Browser_icon.svg" id="topIcon">

<div id="startupScreen">
  <img src="Tor-logo-2011-flat.svg" id="startupLogo" onclick="enterSystem(event)">
</div>

<div class="form" id="loginBox" style="display:none;">
  <label>Username</label>
  <div class="inputForm">
    <input class="input" id="username" placeholder="Enter Username">
  </div>

  <label>Password</label>
  <div class="inputForm">
    <input class="input" id="password" type="password" placeholder="Enter Password">
  </div>

  <button class="button-submit" onclick="login(event)">Login</button>
  <div class="error" id="errorText">Error</div>
</div>

<div id="loading">Decrypting system...</div>
<div id="granted">ACCESS GRANTED</div>

<script>
// SAFE SOUND PLAYER (OVERLAP + LOW VOLUME)
function playSound(src, volume=0.3){
  const s = new Audio(src);
  s.volume = volume;
  s.play().catch(()=>{});
}

// CLICK SOUND
document.addEventListener("click", e=>{
  if(e.target.id==="startupLogo") return;
  playSound("click.mp3",0.2);
});

// INCORRECT SOUND (500ms GAP)
let lastIncorrect=0;
function playIncorrect(){
  const now=Date.now();
  if(now-lastIncorrect>=500){
    playSound("incorrect.mp3",0.35);
    lastIncorrect=now;
  }
}

// STARTUP
function enterSystem(e){
  e.stopPropagation();

  const logo=document.getElementById("startupLogo");

  playSound("startup.mp3",0.4);

  setTimeout(()=>{
    logo.classList.remove("show");
    void logo.offsetWidth;
    logo.classList.add("show");
  },50);

  setTimeout(()=>{
    document.getElementById("startupScreen").style.display="none";
    document.getElementById("loginBox").style.display="flex";
    document.getElementById("topIcon").style.display="block";
  },700);
}

// LOGIN
function login(e){
  e.stopPropagation();

  const user=document.getElementById("username").value;
  const pass=document.getElementById("password").value;
  const error=document.getElementById("errorText");

  if(user==="what_isthepassword?" && pass==="fidelio"){
    playSound("correct.mp3",0.3);

    document.getElementById("loginBox").style.display="none";

    const load=document.getElementById("loading");
    load.style.display="block";
    playSound("loading.mp3",0.3);

    setTimeout(()=>{
      load.style.display="none";
      const granted=document.getElementById("granted");
      granted.style.display="block";
      playSound("access granted.mp3",0.4);
      typeEffect();
    },2000);

  }else{
    error.style.display="block";
    error.innerText=randomError();
    playIncorrect();
  }
}

function randomError(){
  const errors=[
    "Connection Lost...",
    "System Failure...",
    "Unauthorized Access...",
    "Data Corrupted...",
    "ERROR 0x0001"
  ];
  return errors[Math.floor(Math.random()*errors.length)];
}

function typeEffect(){
  const text="ACCESS GRANTED";
  const el=document.getElementById("granted");
  el.innerHTML="";
  let i=0;
  function type(){
    if(i<text.length){
      el.innerHTML+=text.charAt(i);
      i++;
      setTimeout(type,100);
    }
  }
  type();
}
</script>

</body>
</html>
