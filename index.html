<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System</title>

<style>
/* FORM STYLES */
.form {
  display: flex;
  flex-direction: column;
  gap: 10px;
  background-color: #1f1f1f;
  padding: 30px;
  width: 450px;
  border-radius: 20px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
    Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
}

::placeholder {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
    Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
  color: #aaa;
}

.inputForm {
  border: 1.5px solid #333;
  border-radius: 10px;
  height: 50px;
  display: flex;
  align-items: center;
  padding-left: 10px;
  background-color: #2b2b2b;
}

.input {
  margin-left: 10px;
  border-radius: 10px;
  border: none;
  width: 100%;
  height: 100%;
  background-color: transparent;
  color: #f1f1f1;
}

.input:focus {
  outline: none;
}

.button-submit {
  margin: 20px 0 10px 0;
  background-color: #2d79f3;
  border: none;
  color: white;
  font-size: 15px;
  font-weight: 500;
  border-radius: 10px;
  height: 50px;
  width: 100%;
  cursor: pointer;
}

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
  overflow: hidden;
}

.error {
  color: red;
  font-size: 12px;
  display: none;
}

#loading { display: none; color: #2d79f3; font-family: monospace; }
#granted { display: none; color: #00ff00; font-family: monospace; font-size:24px; }

/* STARTUP SCREEN */
#startupScreen {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

/* LOGO */
#startupLogo {
  width: 150px;
  cursor:pointer;
}

/* GLITCH ANIMATION */
#startupLogo.show {
  animation: glitchIn 0.6s steps(2,end) forwards;
}

@keyframes glitchIn {
  0% { opacity:0; transform:scale(1.2) skew(10deg); filter:hue-rotate(90deg);}
  20% { opacity:1; transform:scale(0.9) skew(-10deg); filter:hue-rotate(-90deg);}
  40% { transform:scale(1.1) skew(5deg); filter:hue-rotate(180deg);}
  60% { transform:scale(0.95) skew(-3deg); filter:hue-rotate(-180deg);}
  80% { transform:scale(1.02) skew(2deg);}
  100% { opacity:1; transform:scale(1); filter:none;}
}

#topIcon {
  position:fixed;
  top:10px;
  left:10px;
  width:30px;
  display:none;
}
</style>
</head>

<body>

<img src="Tor_Browser_icon.svg" id="topIcon">

<div id="startupScreen">
  <img src="Tor-logo-2011-flat.svg" id="startupLogo" onclick="enterSystem(event)">
</div>

<div class="form" id="loginBox" style="display:none;">
  <div class="flex-column"><label>Username</label></div>
  <div class="inputForm">
    <input class="input" id="username" placeholder="Enter Username">
  </div>

  <div class="flex-column"><label>Password</label></div>
  <div class="inputForm">
    <input class="input" id="password" type="password" placeholder="Enter Password">
  </div>

  <button class="button-submit" onclick="login(event)">Login</button>
  <div class="error" id="errorText">Error...</div>
</div>

<div id="loading">Decrypting system...</div>
<div id="granted">ACCESS GRANTED</div>

<!-- AUDIO -->
<audio id="startupSound" src="startup.mp3"></audio>
<audio id="loadingSound" src="loading.mp3"></audio>
<audio id="incorrectSound" src="incorrect.mp3"></audio>
<audio id="correctSound" src="correct.mp3"></audio>
<audio id="grantedSound" src="access granted.mp3"></audio>
<audio id="clickSound" src="click.mp3"></audio>

<script>
// GLOBAL CLICK SOUND
document.addEventListener("click", function(e) {
  if(e.target.id === "startupLogo") return; // skip logo
  const click = document.getElementById("clickSound");
  click.currentTime = 0;
  click.play().catch(()=>{});
});

// ENTER SYSTEM (glitch + startup sound on click)
function enterSystem(e){
  e.stopPropagation();
  const sound = document.getElementById("startupSound");
  const logo = document.getElementById("startupLogo");

  sound.currentTime = 0;
  sound.play().catch(()=>{});

  setTimeout(()=>{
    logo.classList.remove("show");
    void logo.offsetWidth;
    logo.classList.add("show");
  },50);

  setTimeout(()=>{
    document.getElementById("startupScreen").style.display="none";
    document.getElementById("loginBox").style.display="flex";
    document.getElementById("topIcon").style.display="block";
  },700);
}

// LOGIN
function login(e){
  e.stopPropagation();
  const user=document.getElementById("username").value;
  const pass=document.getElementById("password").value;
  const error=document.getElementById("errorText");

  if(user==="what_isthepassword?" && pass==="fidelio"){
    document.getElementById("correctSound").play();
    document.getElementById("loginBox").style.display="none";
    const load=document.getElementById("loading");
    load.style.display="block";
    document.getElementById("loadingSound").play();

    setTimeout(()=>{
      load.style.display="none";
      const granted=document.getElementById("granted");
      granted.style.display="block";
      document.getElementById("grantedSound").play();
      typeEffect();
    },2000);

  }else{
    error.style.display="block";
    error.innerText=randomError();
    document.getElementById("incorrectSound").play();
  }
}

function randomError(){
  const errors=["Connection Lost...","System Failure...","Unauthorized Access...","Data Corrupted...","ERROR 0x0001"];
  return errors[Math.floor(Math.random()*errors.length)];
}

function typeEffect(){
  const text="ACCESS GRANTED";
  const el=document.getElementById("granted");
  el.innerHTML="";
  let i=0;
  function type(){
    if(i<text.length){
      el.innerHTML+=text.charAt(i);
      i++;
      setTimeout(type,100);
    }
  }
  type();
}
</script>

</body>
</html>
